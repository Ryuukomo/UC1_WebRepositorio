<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title> Aula de Formulários em HTML </title>
</head>
<body>
    
    <h1>Formulários</h1>
    <p> Como adicionar Inputs em HTML ? </p>

    <form>
        
        <p>Digite seu nome:</p>
    
        <input required minlength="3"><br/><button>Enviar</button>

        <p>Digite sua senha:</p>
        
        <input type="password"required><br/><button>Enviar</button>

        <P>Digite seu texto</P>

        <input type="text" size="100" placeholder="digite sua senha">
    
    </form>

</body>
</html>
